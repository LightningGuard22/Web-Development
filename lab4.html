<!DOCTYPE html>
<html>
<head>
    <title>Lab 4</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: green;
            text-align: center;
        }

        .internal-paragraph {
            color: purple;
            font-size: 18px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="lab4style.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Welcome to Lab 4
    </h1>

    <p style="color:blue; font-size:18px;">
        This paragraph uses inline CSS.
    </p>

    <!-- Internal CSS -->
    <h2>Internal CSS Example</h2>

    <p class="internal-paragraph">
        This paragraph uses internal CSS.
    </p>

    <!-- External CSS -->
    <h3>External CSS Example</h3>

    <p class="external-paragraph">
        This paragraph uses external CSS from style.css.
    </p>

</body>
</html>
