<!DOCTYPE html>
<html>
<head>
    <title>Lab 5 - CSS Selectors</title>
    <link rel="stylesheet" href="lab5style.css">
</head>
<body>

    <h1>CSS Selectors Examples</h1>

    <!-- Element Selector -->
    <h2>Element Selector</h2>

    <!-- ID Selector -->
    <p id="special">
        This paragraph uses an ID selector.
    </p>

    <!-- Class Selector -->
    <p class="note">
        This paragraph uses a Class selector.
    </p>

    <!-- Universal Selector -->
    <h3>Universal Selector Example</h3>

    <!-- Group Selector -->
    <h4>Group Selector Heading</h4>

    <!-- Descendant Selector -->
    <div>
        <p>
            This paragraph demonstrates a Descendant selector.
        </p>
    </div>

</body>
</html>
